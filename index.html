
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TheSuit</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #1E6BF1;
            --bg-main: #F8FAFC;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            overscroll-behavior: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .nav-page { display: none; }
        .nav-page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .camera-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto;
        }
        #video-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <header class="p-6 max-w-md mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-600">TheSuit</h1>
        <div id="clock" class="text-right font-bold text-slate-700">00:00:00</div>
    </header>

    <main class="px-6 max-w-md mx-auto">
        
        <!-- PAGE 1: START / GEOFENCE -->
        <section id="page-start" class="nav-page active">
            <div class="glass-card p-8 text-center border border-white">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 transform rotate-3">
                    <i class="fa-solid fa-map-location-dot text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold mb-1">Punch In</h2>
                <div id="company-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Terminal ID: Not Set</div>
                
                <p class="text-slate-500 text-sm mb-8">Location and identity verification required.</p>
                
                <div id="status-area" class="space-y-3 mb-8 text-left hidden">
                    <div id="geo-status" class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="status-icon w-6 h-6 flex items-center justify-center rounded-full bg-slate-200 text-xs">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                        </div>
                        <span class="text-xs font-semibold text-slate-600">Verifying Geofence...</span>
                    </div>
                </div>

                <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    <span>Start Attendance</span>
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>
        </section>

        <!-- PAGE 2: CAMERA / LIVENESS -->
        <section id="page-camera" class="nav-page">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="font-bold text-slate-800">Face Verification</h2>
                <div id="liveness-step" class="text-[10px] font-black uppercase tracking-widest text-blue-500 bg-blue-50 px-2 py-1 rounded">Blink Detected: 0/2</div>
            </div>

            <div class="camera-box shadow-2xl mb-6">
                <video id="video-feed" autoplay playsinline muted></video>
                <div class="scan-line"></div>
                <div class="absolute inset-0 border-[16px] border-black/20 pointer-events-none rounded-3xl"></div>
                <div id="cam-feedback" class="absolute bottom-4 left-0 w-full text-center text-white text-xs font-bold drop-shadow-md">
                    Position your face
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div id="step-blink" class="bg-white p-4 rounded-2xl border-2 border-slate-100 flex items-center gap-3">
                    <i class="fa-solid fa-eye text-slate-400"></i>
                    <span class="text-[10px] font-bold uppercase">Blink Twice</span>
                </div>
                <div id="step-face" class="bg-white p-4 rounded-2xl border-2 border-slate-100 flex items-center gap-3">
                    <i class="fa-solid fa-user-check text-slate-400"></i>
                    <span class="text-[10px] font-bold uppercase">Stay Still</span>
                </div>
            </div>
        </section>

        <!-- PAGE 3: RESULT -->
        <section id="page-result" class="nav-page">
            <div class="glass-card p-8 text-center border border-white">
                <div id="res-icon" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"></div>
                <h2 id="res-title" class="text-2xl font-bold mb-2">--</h2>
                <p id="res-msg" class="text-slate-500 text-sm mb-8">--</p>
                
                <button id="btn-reset" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Return to Dashboard</button>
            </div>
        </section>

    </main>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
    (function() {
        const state = {
            company: {
                id: "DEFAULT-ID" // Fallback
            },
            geoWatchId: null,
            camera: null,
            faceMesh: null,
            isProcessing: false,
            blinks: 0,
            lastEyeState: 'open',
            framesCaptured: false
        };

        const API_URL = "http://51.20.54.232:8000/api"; 

        // UI Helpers
        const navigate = (id) => {
            document.querySelectorAll('.nav-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        const updateClock = () => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        };
        setInterval(updateClock, 1000);

        // =============================================
        // TOKEN & QR HANDLING
        // =============================================
        
        function initTerminal() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                setCompanyId(token);
            }
        }

        window.setCompanyId = function(id) {
            if (!id) return;
            state.company.id = id;
            const display = document.getElementById('company-display');
            if (display) display.innerText = `Terminal ID: ${id}`;
            console.log("Terminal Company ID set to:", id);
        };

        // Priority: QR overrides URL token
        window.handleQRScan = function(decodedString) {
            setCompanyId(decodedString);
        };

        window.addEventListener('load', initTerminal);

        // =============================================
        // AI PRELOAD
        // =============================================
        async function preloadAI() {
            state.faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            state.faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.8,
                minTrackingConfidence: 0.8
            });
            state.faceMesh.onResults(handleFaceResults);
        }
        preloadAI();

        // =============================================
        // GPS LOGIC
        // =============================================
        document.getElementById('btn-start').onclick = async () => {
            const statusArea = document.getElementById('status-area');
            const btn = document.getElementById('btn-start');
            
            statusArea.classList.remove('hidden');
            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div>`;

            if (!navigator.geolocation) {
                updateStatus('geo', 'error', 'GPS not supported');
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                updateStatus('geo', 'pending', 'Checking Geofence...');
                
                const result = await validateLocation(coords);
                
                if (result.success) {
                    updateStatus('geo', 'success', result.message || 'Inside Workzone');
                    setTimeout(() => startCameraSequence(), 800);
                } else {
                    showError("Access Denied", result.message || "You are outside the allowed geofence area.");
                }
            }, (err) => {
                showError("GPS Error", "Please enable location services to check in.");
                btn.disabled = false;
                btn.innerHTML = `Start Attendance`;
            }, { enableHighAccuracy: true });
        };

        async function validateLocation(coords) {
            try {
                const response = await fetch(`${API_URL}/verify-location/`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        latitude: coords.lat,
                        longitude: coords.lng,
                        company_id: state.company.id// Uses dynamic ID
                    }),
                });
                return await response.json();
            } catch (error) {
                return { success: false, message: "Network error during location check." };
            }
        }

        function updateStatus(id, type, text) {
            const el = document.getElementById(`${id}-status`);
            const icon = el.querySelector('.status-icon');
            const label = el.querySelector('span');
            
            label.innerText = text;
            if (type === 'success') {
                icon.className = "status-icon w-6 h-6 flex items-center justify-center rounded-full bg-emerald-500 text-white text-[10px]";
                icon.innerHTML = `<i class="fa-solid fa-check"></i>`;
            } else if (type === 'error') {
                icon.className = "status-icon w-6 h-6 flex items-center justify-center rounded-full bg-red-500 text-white text-[10px]";
                icon.innerHTML = `<i class="fa-solid fa-xmark"></i>`;
            }
        }

        // =============================================
        // CAMERA & LIVENESS
        // =============================================
        async function startCameraSequence() {
            navigate('page-camera');
            const video = document.getElementById('video-feed');
            
            state.camera = new Camera(video, {
                onFrame: async () => {
                    if (state.faceMesh && !state.isProcessing) {
                        await state.faceMesh.send({ image: video });
                    }
                },
                width: 640, height: 480
            });
            state.camera.start();
        }

        function handleFaceResults(results) {
            if (state.isProcessing) return;

            const feedback = document.getElementById('cam-feedback');
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                feedback.innerText = "Face not visible";
                return;
            }

            feedback.innerText = "Verification in progress...";
            const landmarks = results.multiFaceLandmarks[0];
            const leftEye = [landmarks[362], landmarks[385], landmarks[387], landmarks[263], landmarks[373], landmarks[380]];
            const ear = calculateEAR(leftEye);

            if (ear < 0.18) {
                if (state.lastEyeState === 'open') {
                    state.blinks++;
                    state.lastEyeState = 'closed';
                    document.getElementById('liveness-step').innerText = `Blink Detected: ${state.blinks}/2`;
                }
            } else {
                state.lastEyeState = 'open';
            }

            if (state.blinks >= 2 && !state.framesCaptured) {
                captureAndSend();
            }
        }

        function calculateEAR(points) {
            const v1 = Math.dist(points[1], points[5]);
            const v2 = Math.dist(points[2], points[4]);
            const h = Math.dist(points[0], points[3]);
            return (v1 + v2) / (2.0 * h);
        }
        Math.dist = (p1, p2) => Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);

        // =============================================
        // CAPTURE & RECOGNITION
        // =============================================
        async function captureAndSend() {
            state.isProcessing = true;
            state.framesCaptured = true;

            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                if (state.camera) state.camera.stop();

                updateStatusText("Authenticating Identity...");
                const result = await sendToBackend(blob);

                if (result.success) {
                    showSuccess(result.message);
                } else {
                    showError("Identity Failed", result.message || "Face not recognized.");
                }
            }, 'image/jpeg', 0.8);
        }

        async function sendToBackend(imageBlob) {
            try {
                const formData = new FormData();
                formData.append("image", imageBlob, "capture.jpg");
                formData.append("company_id", state.company.id); // Uses dynamic ID

                const response = await fetch(`${API_URL}/recognize/`, {
                    method: "POST",
                    body: formData,
                });

                return await response.json();
            } catch (error) {
                return { success: false, message: "Network error during face verification." };
            }
        }

        function updateStatusText(text) {
            document.getElementById('cam-feedback').innerText = text;
        }

        function showSuccess(message) {
            navigate('page-result');
            const icon = document.getElementById('res-icon');
            icon.className = "w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 scale-110 transition-transform";
            icon.innerHTML = `<i class="fa-solid fa-check text-3xl"></i>`;
            document.getElementById('res-title').innerText = "Punch Success";
            document.getElementById('res-msg').innerText = message || "Verification complete.";
        }

        function showError(title, msg) {
            navigate('page-result');
            const icon = document.getElementById('res-icon');
            icon.className = "w-20 h-20 bg-red-500 text-white rounded-full flex items-center justify-center mx-auto mb-6";
            icon.innerHTML = `<i class="fa-solid fa-xmark text-3xl"></i>`;
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-msg').innerText = msg;
        }

        document.getElementById('btn-reset').onclick = () => {
            state.blinks = 0;
            state.isProcessing = false;
            state.framesCaptured = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-start').innerHTML = `<span>Start Attendance</span><i class="fa-solid fa-chevron-right text-xs"></i>`;
            document.getElementById('status-area').classList.add('hidden');
            document.getElementById('liveness-step').innerText = `Blink Detected: 0/2`;
            navigate('page-start');
        };

    })();
    </script>
</body>
</html>
